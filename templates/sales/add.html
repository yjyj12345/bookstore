{% extends "base.html" %}

{% block title %}记录销售{% endblock %}
{% block page_title %}记录销售{% endblock %}
{% block page_description %}添加新的销售记录{% endblock %}

{% block content %}
<div class="bg-white rounded-xl p-6 card-shadow max-w-lg mx-auto">
    <form method="POST">
        <div class="space-y-6">
            <div>
                <label for="book_id" class="block text-sm font-medium text-gray-700 mb-1">图书</label>
                <select id="book_id" name="book_id" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none form-input-focus" required>
                    <option value="">请选择图书</option>
                    {% for book in books %}
                    <option value="{{ book.BookID }}">{{ book.bookname }} (库存: {{ book.Inventory }})</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label for="sell_number" class="block text-sm font-medium text-gray-700 mb-1">销售数量</label>
                <input type="number" id="sell_number" name="sell_number" min="1" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none form-input-focus" required>
            </div>

            <div>
                <label for="sell_date" class="block text-sm font-medium text-gray-700 mb-1">销售日期</label>
                <input type="date" id="sell_date" name="sell_date" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none form-input-focus" value="{{ today }}" required>
            </div>
        </div>

        <div class="mt-8 flex justify-end space-x-3">
            <a href="{{ url_for('sales_list') }}" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition-colors">
                取消
            </a>
            <button type="submit" class="px-4 py-2 bg-primary text-white rounded-lg shadow-sm hover:bg-primary/90 transition-colors">
                记录销售
            </button>
        </div>
    </form>
</div>
{% endblock %}

{% extends "base.html" %}

{% block title %}编辑图书{% endblock %}
{% block page_title %}编辑图书{% endblock %}
{% block page_description %}修改图书信息{% endblock %}

{% block content %}
<div class="bg-white rounded-xl p-6 card-shadow max-w-3xl mx-auto">
    <form method="POST">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label for="bookname" class="block text-sm font-medium text-gray-700 mb-1">书名</label>
                <input type="text" id="bookname" name="bookname" value="{{ book.bookname }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none form-input-focus" required>
            </div>

            <div>
                <label for="type" class="block text-sm font-medium text-gray-700 mb-1">类型</label>
                <input type="text" id="type" name="type" value="{{ book.type }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none form-input-focus">
            </div>

            <div class="md:col-span-2">
                <label for="introduction" class="block text-sm font-medium text-gray-700 mb-1">简介</label>
                <textarea id="introduction" name="introduction" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none form-input-focus">{{ book.Introduction }}</textarea>
            </div>

            <div>
                <label for="inventory" class="block text-sm font-medium text-gray-700 mb-1">库存</label>
                <input type="number" id="inventory" name="inventory" min="0" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none form-input-focus" value="{{ book.Inventory }}" required>
            </div>

            <div>
                <label for="new_purchase" class="block text-sm font-medium text-gray-700 mb-1">新进数量</label>
                <input type="number" id="new_purchase" name="new_purchase" min="0" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none form-input-focus" value="{{ book.NewPurchase }}" required>
            </div>

            <div>
                <label for="purchase_price" class="block text-sm font-medium text-gray-700 mb-1">进价</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <span class="text-gray-500">¥</span>
                    </div>
                    <input type="number" id="purchase_price" name="purchase_price" min="0" step="0.01" class="w-full pl-8 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none form-input-focus" value="{{ book.PurchasePrice }}" required>
                </div>
            </div>

            <div>
                <label for="selling_price" class="block text-sm font-medium text-gray-700 mb-1">售价</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <span class="text-gray-500">¥</span>
                    </div>
                    <input type="number" id="selling_price" name="selling_price" min="0" step="0.01" class="w-full pl-8 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none form-input-focus" value="{{ book.SellingPrice }}" required>
                </div>
            </div>
        </div>

        <div class="mt-8 flex justify-end space-x-3">
            <a href="{{ url_for('books_list') }}" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition-colors">
                取消
            </a>
            <button type="submit" class="px-4 py-2 bg-primary text-white rounded-lg shadow-sm hover:bg-primary/90 transition-colors">
                保存修改
            </button>
        </div>
    </form>
</div>
{% endblock %}
